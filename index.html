<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Copy Game Launcher</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Pattern Copy Game</h1>
      <p>Configure the game, then open the game window.</p>
    </header>

    <main class="container">
      <section class="card">
        <h2>Game Setup</h2>

        <form id="setupForm">
          <div class="form-row">
            <label for="playerName">Player Name</label>
            <input
              type="text"
              id="playerName"
              name="playerName"
              maxlength="20"
              placeholder="Enter player name"
            />
          </div>

          <div class="form-row">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty" name="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <div class="form-row">
            <label for="gridSize">Grid Size</label>
            <select id="gridSize" name="gridSize">
              <option value="3">3 x 3</option>
              <option value="4" selected>4 x 4</option>
              <option value="5">5 x 5</option>
            </select>
          </div>

          <fieldset>
            <legend>Theme</legend>

            <label class="option-line">
              <input type="radio" name="theme" value="colours" checked />
              Colours
            </label>

            <label class="option-line">
              <input type="radio" name="theme" value="symbols" />
              Symbols
            </label>

            <label class="option-line">
              <input type="radio" name="theme" value="lights" />
              Lights
            </label>
          </fieldset>

          <fieldset>
            <legend>Options</legend>

            <label class="option-line">
              <input type="checkbox" id="showHints" />
              Show hint marker
            </label>

            <label class="option-line">
              <input type="checkbox" id="strictMode" />
              Strict mode
            </label>

            <label class="option-line">
              <input type="checkbox" id="showPreviewTime" checked />
              Show preview timer
            </label>
          </fieldset>

          <div class="button-row">
            <button type="button" id="openGameBtn">Open Game Window</button>
            <button type="button" id="leaderboardBtn">Leaderboard</button>
            <button type="button" id="saveSettingsBtn">Save Settings</button>
            <button type="button" id="loadSettingsBtn">Load Settings</button>
            <button type="button" id="resetSettingsBtn">Reset Settings</button>
            <button type="button" id="instructionsBtn">Instructions</button>
          </div>
        </form>

        <div class="preview-box">
          <h3>Live Preview</h3>
          <p id="previewText">No settings selected yet.</p>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <p>Pattern Copy Game Launcher</p>
    </footer>

    <script src="launcher.js"></script>
  </body>
</html>
