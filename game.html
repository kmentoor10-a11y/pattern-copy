<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Copy Game</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-window-wrap">
      <section class="card">
        <h1>Pattern Copy Game</h1>

        <div class="stats-grid game-stats-grid">
          <div class="stat-box">
            <span class="label">Player</span>
            <span id="displayPlayer">-</span>
          </div>
          <div class="stat-box">
            <span class="label">Round</span>
            <span id="displayRound">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Score</span>
            <span id="displayScore">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Lives</span>
            <span id="displayLives">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Best Score</span>
            <span id="displayBestScore">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Preview</span>
            <span id="displayPreview">-</span>
          </div>
        </div>
      </section>

      <section class="card">
        <div id="ruleArea" class="rule-area">
          Study the pattern and then copy it.
        </div>
        <div id="messageArea" class="message-area">
          Click Start Game when ready.
        </div>
        <div id="timerBarContainer">
          <div id="timerBar"></div>
        </div>
      </section>

      <section class="card">
        <div id="gridArea" class="grid-area"></div>
      </section>

      <section class="card controls-card">
      <div class="button-row">
          <button id="startBtn" type="button">Start Game</button>
          <button id="checkBtn" type="button">Check Pattern</button>
          <button id="nextRoundBtn" type="button">Next Round</button>
          <button id="saveBtn" type="button">Save Session</button>
          <button id="loadBtn" type="button">Load Session</button>
          <button id="resetBtn" type="button">Reset Game</button>
          <button id="backBtn" type="button">Back to Settings</button>
        </div>
        </section>

      <section class="card">
        <h2>Round Results</h2>
        <div id="resultsArea" class="results-area">No results yet.</div>
      </section>

      <section class="card">
        <h2>Game Log</h2>
        <div id="logArea" class="log-area"></div>
      </section>
    </main>
    

    <!-- Change 5: Added game over modal -->
    <div id="gameOverModal" class="game-over-modal hidden">
      <div class="game-over-content">
        <h2>Game Over</h2>

        <p id="finalScoreText">Final Score: 0</p>
        <p id="bestScoreText">Best Score: 0</p>
        <p id="roundText">Rounds Survived: 0</p>

        <button id="playAgainBtn">Play Again</button>
      </div>
    </div>
    <script src="game.js"></script>
  </body>
</html>
